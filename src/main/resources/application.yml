spring:
  application:
    name: Parking
  session:
    jdbc:
      schema: classpath:org/springframework/session/jdbc/schema-postgresql.sql
      initialize-schema: always
  datasource:
    url: jdbc:postgresql://localhost:5432/parkings
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  flyway:
    baseline-on-migrate: true
    enabled: true
