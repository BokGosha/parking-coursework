<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .content {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<header th:replace="~{/header :: header}"></header>
<main class="container">
    <div class="content">
        <a href="/logout" class="btn btn-danger mb-3">Выйти</a>
        <h2>Аренды пользователя</h2>
        <table class="table">
            <thead>
            <tr>
                <th>Начальная дата</th>
                <th>Конечная дата</th>
                <th>Продолжительность</th>
                <th>Парковочное место</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rent : ${profile.rents}">
                <td th:text="${rent.formattedStartDate}"></td>
                <td th:text="${rent.formattedFinishDate} ?: '—'"></td>
                <td th:text="${rent.durationInSeconds}"></td>
                <td><a th:href="@{/places/{placeId}(placeId=${rent.placeId})}" th:text="${rent.placeNumber}"></a></td>
                <td>
                    <a th:if="${rent.finishDate == null}"
                       th:href="@{/rents(placeId=${rent.placeId})}" class="btn btn-success">Активна</a>
                    <span th:unless="${rent.finishDate == null}" class="badge bg-secondary">Закончена</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Подключение Bootstrap JS (необязательно, если не используется функциональность JS) -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
