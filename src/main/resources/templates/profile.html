<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{/header :: header}"></header>
<main class="container">
    <section class="page-card table-card">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h2 class="page-title mb-0">Аренды пользователя</h2>
            <a href="/logout" class="btn btn-outline-danger">Выйти</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Начальная дата</th>
                    <th>Конечная дата</th>
                    <th>Продолжительность (сек)</th>
                    <th>Парковочное место</th>
                    <th>Статус</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="rent : ${profile.rents}">
                    <td th:text="${rent.formattedStartDate}"></td>
                    <td th:text="${rent.formattedFinishDate} ?: '—'"></td>
                    <td th:text="${rent.durationInSeconds}"></td>
                    <td><a th:href="@{/places/{placeId}(placeId=${rent.placeId})}" th:text="${rent.placeNumber}"></a></td>
                    <td>
                        <a th:if="${rent.finishDate == null}" th:href="@{/rents(placeId=${rent.placeId})}" class="btn btn-success btn-sm">Активна</a>
                        <span th:unless="${rent.finishDate == null}" class="badge bg-secondary">Закончена</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
