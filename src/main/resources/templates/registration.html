<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{/header :: header}"></header>
<main class="container">
    <div class="page-card auth-card">
        <h1 class="page-title">Регистрация</h1>

        <div th:if="${param.success}">
            <div class="alert alert-info" role="alert">Вы успешно зарегистрировались в нашем приложении!</div>
        </div>

        <div th:if="${param.name_invalid}">
            <div class="alert alert-danger" role="alert">Данное имя уже зарегистрировано!</div>
        </div>

        <form th:action="@{/registration}" method="post" th:object="${user}">
            <div class="mb-3">
                <label for="firstName" class="form-label">Имя пользователя</label>
                <input id="firstName" class="form-control" th:field="*{username}" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input id="password" class="form-control" type="password" th:field="*{password}" required>
            </div>

            <div class="d-grid gap-2 d-md-flex align-items-center">
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <span class="text-muted">Уже зарегистрированы? <a href="/" th:href="@{/login}">Войдите в аккаунт</a></span>
            </div>
        </form>
    </div>
</main>
</body>
</html>
