<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Информация о парковке</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{/header :: header}"></header>
<main class="container">
    <section class="page-card mb-3">
        <h2 class="section-title">Информация о парковке</h2>
        <p class="mb-0"><strong>Номер:</strong> <span th:text="${place.number}"></span></p>
    </section>

    <section class="page-card mb-3">
        <h2 class="section-title">Статистика аренды</h2>
        <p class="mb-0">Количество аренд: <span th:text="${place.rents.size()}"></span></p>
    </section>

    <section class="page-card">
        <h2 class="section-title">Пользователи, бравшие место в аренду</h2>
        <ul class="list-group">
            <li class="list-group-item" th:each="rent : ${place.rents}">
                <span th:text="${rent.username}"></span> -
                <span th:text="${rent.formattedStartDate}"></span> до
                <span th:text="${rent.formattedFinishDate} ?: '—'"></span> (продолжительность:
                <span th:text="${rent.durationInSeconds}"></span> секунд)
            </li>
        </ul>
    </section>
</main>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
