<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Информация о парковочном месте</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{/header :: header}"></header>
<main class="container">
    <section class="page-card">
        <h2 class="page-title">Информация о парковочном месте</h2>
        <p>Номер: <strong th:text="${place.number}"></strong></p>

        <div th:if="${rent.finishDate == null}" class="mb-3">
            <h3 class="section-title">Секундомер аренды</h3>
            <p id="timer" class="timer mb-0" th:data-start-date="${rent.startDate}" th:data-finish-date="${rent.finishDate}"></p>
        </div>

        <a th:if="${rent.finishDate != null}" href="/profile" class="btn btn-success">Аренда завершена</a>

        <form th:if="${rent.finishDate == null}" th:action="@{/rents/finish}" method="post" class="d-inline">
            <input type="hidden" name="rentId" th:value="${rent.id}">
            <button type="submit" class="btn btn-primary">Завершить аренду</button>
        </form>
    </section>
</main>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    function updateTimer() {
        var timerElement = document.getElementById('timer');
        if (!timerElement) {
            return;
        }

        var finishDate = timerElement.dataset.finishDate;
        var startDate = timerElement.dataset.startDate;
        if (startDate && !finishDate) {
            var startTime = new Date(startDate).getTime();
            setInterval(function () {
                var currentTime = new Date().getTime();
                var difference = currentTime - startTime;
                var hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((difference % (1000 * 60)) / 1000);
                timerElement.innerText = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
            }, 1000);
        }
    }

    function pad(number) {
        return (number < 10 ? '0' : '') + number;
    }

    updateTimer();
</script>
</body>
</html>
