<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Парковочные места</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{/header :: header}"></header>
<main class="container">
    <section class="page-card table-card">
        <h1 class="page-title">Парковочные места</h1>

        <div class="d-flex flex-wrap gap-2 mb-3">
            <a class="btn btn-primary" th:href="@{/places/sorted}">Сортировать по номеру</a>
        </div>

        <form class="mb-4" action="/places/filtered" method="get">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label" for="available">Фильтрация по доступности</label>
                    <select id="available" class="form-select" name="available">
                        <option value="true">Доступно</option>
                        <option value="false">Занято</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Применить фильтр</button>
                </div>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Номер</th>
                    <th>Доступность</th>
                    <th>Действие</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="place : ${places}">
                    <td th:text="${place.number}">Number</td>
                    <td>
                        <span th:if="${place.available}" class="status-chip available">Доступно</span>
                        <span th:unless="${place.available}" class="status-chip busy">Занято</span>
                    </td>
                    <td>
                        <span th:if="${place.available}">
                            <a class="btn btn-success btn-sm" th:href="@{/rents(placeId=${place.id})}">Арендовать</a>
                        </span>
                        <span th:unless="${place.available}" class="btn btn-secondary btn-sm disabled">Ожидать</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
