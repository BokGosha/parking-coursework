<header class="header bg-dark py-3">
    <div class="container">
        <h1 class="text-light brand-title">Сервис парковки</h1>
        <nav class="nav" aria-label="Главное меню">
            <ul class="nav nav-list justify-content-end">
                <li class="nav-item"><a class="nav-link text-light" th:href="@{/}">Главная</a></li>
                <li class="nav-item"><a class="nav-link text-light" th:href="@{/places}">Парковочные места</a></li>
                <li th:if="${userDetails != null}" class="nav-item">
                    <a class="nav-link text-light" th:href="@{/profile}">
                        Профиль <span th:text="${userDetails.getUsername()}"></span>
                    </a>
                </li>
                <li th:if="${userDetails != null}" class="nav-item">
                    <a class="nav-link text-light" th:href="@{/logout}">Выход</a>
                </li>
                <li th:unless="${userDetails != null}" class="nav-item">
                    <a class="nav-link text-light" th:href="@{/login}">Вход</a>
                </li>
                <li th:unless="${userDetails != null}" class="nav-item">
                    <a class="nav-link text-light" th:href="@{/registration}">Регистрация</a>
                </li>
            </ul>
        </nav>
    </div>
</header>
